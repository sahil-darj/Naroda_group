<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residential Projects | Naroda Group</title>
    <link rel="icon" type="image/jpeg" href="naroda_group_assets/naroda copy.jpeg">
    <!-- keeping the same vendor / index styles as original -->
    <link rel="stylesheet" href="assets/vendor-Cs8yHCv6.css">
    <link rel="stylesheet" href="assets/index-BHu5_JeH.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,700&display=swap"
        rel="stylesheet">
    <style>
        /* base reset / same as original plus minor adjustments */
        .min-h-screen {
            min-height: 100vh;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: #f9fafb;
        }

        .container-base {
            max-width: 1400px;
            margin: 0 auto;
        }

        .space-y-16>*+* {
            margin-top: 4rem;
        }

        .bg-black {
            background-color: #000;
        }

        .text-white {
            color: #fff;
        }

        .uppercase {
            text-transform: uppercase;
        }

        .tracking-widest {
            letter-spacing: 0.1em;
        }

        .grid {
            display: grid;
        }

        .gap-8 {
            gap: 2rem;
        }

        .rounded-xl {
            border-radius: 1.5rem;
        }

        .shadow-lg {
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.15), 0 10px 15px -6px rgba(0, 0, 0, 0.05);
        }

        .overflow-hidden {
            overflow: hidden;
        }

        .relative {
            position: relative;
        }

        .absolute {
            position: absolute;
        }

        .inset-0 {
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-center {
            justify-content: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .w-full {
            width: 100%;
        }

        .h-full {
            height: 100%;
        }

        .h-96 {
            height: 24rem;
        }

        .object-cover {
            object-fit: cover;
        }

        .opacity-80 {
            opacity: 0.8;
        }

        .p-8 {
            padding: 2rem;
        }

        .px-4 {
            padding-left: 1rem;
            padding-right: 1rem;
        }

        .py-1 {
            padding-top: 0.25rem;
            padding-bottom: 0.25rem;
        }

        .py-2 {
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }

        .pt-6 {
            padding-top: 1.5rem;
        }

        .pb-16 {
            padding-bottom: 4rem;
        }

        .top-6 {
            top: 1.5rem;
        }

        .left-6 {
            left: 1.5rem;
        }

        .text-xs {
            font-size: 0.75rem;
            line-height: 1rem;
        }

        .text-sm {
            font-size: 0.875rem;
            line-height: 1.25rem;
        }

        .text-lg {
            font-size: 1.125rem;
            line-height: 1.75rem;
        }

        .text-xl {
            font-size: 1.25rem;
            line-height: 1.75rem;
        }

        .text-2xl {
            font-size: 1.5rem;
            line-height: 2rem;
        }

        .text-4xl {
            font-size: 2.25rem;
            line-height: 2.5rem;
        }

        .lg\:text-6xl {
            font-size: 3.75rem;
            line-height: 1;
        }

        .font-bold {
            font-weight: 700;
        }

        .font-semibold {
            font-weight: 600;
        }

        .mb-2 {
            margin-bottom: 0.5rem;
        }

        .mb-3 {
            margin-bottom: 0.75rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .border-t {
            border-top: 1px solid #e5e7eb;
        }

        .bg-white {
            background-color: #ffffff;
        }

        .text-gray-600 {
            color: #4b5563;
        }

        .text-gray-500 {
            color: #6b7280;
        }

        .bg-gray-200 {
            background-color: #e5e7eb;
        }

        .bg-gray-100 {
            background-color: #f3f4f6;
        }

        .text-gray-400 {
            color: #9ca3af;
        }

        .hover\:underline:hover {
            text-decoration: underline;
        }

        .group {
            transition: all 0.2s;
        }

        .hover\:-translate-y-2:hover {
            transform: translateY(-0.5rem);
        }

        .transition-transform {
            transition-property: transform;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 0.3s;
        }

        .duration-500 {
            transition-duration: 0.5s;
        }

        .group-hover\:scale-110:hover {
            transform: scale(1.1);
        }

        .rounded {
            border-radius: 0.375rem;
        }

        .grid-cols-1 {
            grid-template-columns: repeat(1, minmax(0, 1fr));
        }

        @media (min-width: 768px) {
            .md\:grid-cols-2 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        /* cta button style */
        .cta-button {
            display: inline-block;
            background: #000;
            color: white;
            padding: 0.85rem 3rem;
            border-radius: 9999px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            border: 1px solid #000;
            font-size: 1.1rem;
        }

        .cta-button:hover {
            background: #222;
            border-color: #222;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.2);
            text-decoration: none;
        }

        .text-center {
            text-align: center;
        }

        .mt-16 {
            margin-top: 4rem;
        }

        .mx-auto {
            margin-left: auto;
            margin-right: auto;
        }

        .badge-large {
            padding: 0.5rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .feature-card {
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* ===== NEW HERO BANNER – exactly like provided image: NARODAGROUP premium living etc ===== */
        .hero-projects {
            position: relative;
            width: 100%;
            height: 80vh;
            /* matches original height ~ h-[400px] but slightly taller for impact */
            background-image: url('naroda_group_assets/1 (23).jpeg');
            background-size: cover;
            background-position: center 30%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            bottom: 50px;
        }

        .hero-projects::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: brightness(0.8);
        }

        .hero-projects-content {
            position: relative;
            z-index: 3;
            color: white;
            max-width: 1200px;
            padding: 1rem;
        }

        .hero-eyebrow {
            font-size: 0.9rem;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            font-weight: 400;
            color: #e6d5b8;
            margin-bottom: 1rem;
            display: block;
        }

        .hero-main {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 800;
            line-height: 0.95;
            text-transform: uppercase;
            color: white;
            margin: 0;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
        }

        .hero-main span {
            font-style: italic;
            font-weight: 400;
            color: #C5A47E;
            text-transform: lowercase;
            display: inline-block;
            margin-left: 0.2rem;
        }

        .hero-secondary {
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #f5efe7;
            margin: 1.5rem 0 2rem;
        }

        .hero-cta {
            display: inline-block;
            background: transparent;
            border: 2px solid #C5A47E;
            color: #C5A47E;
            font-weight: 700;
            padding: 1rem 3rem;
            border-radius: 60px;
            font-size: 1.2rem;
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }

        .hero-cta:hover {
            background: #C5A47E;
            color: black;
            border-color: #C5A47E;
        }

        /* additional small tweak: keep original body background */
    </style>
</head>

<body>
    <!-- header placeholder (as original) -->
    <div id="header-container"></div>

    <!-- ===== NEW HERO BANNER – with exact text style from image ===== -->
    <section class="hero-projects">
        <div class="hero-projects-content">

            <h1 class="hero-main">
                premium<span>living</span>
            </h1>
            <div class="hero-secondary">LUXURY RESIDENTIAL SPACES IN AHMEDABAD</div>

        </div>
    </section>

    <!-- Main Projects Grid (unchanged, exactly as given, but with static cards re‑added) -->
    <main class="space-y-16">
        <!-- Projects Grid (identical to original but includes the two static cards) -->
        <section class="container-base mx-auto px-4 pb-16">
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <!-- Dynamic Projects loaded via JS -->
            </div>

            <div class="flex justify-center mt-16 flex-col items-center gap-4">
                <button id="load-more-btn" class="cta-button text-base uppercase tracking-wider px-10 py-4"
                    style="display:none;">Load More</button>
                <a href="contact-us.html" class="text-gray-500 hover:text-black transition-colors font-medium">Have
                    questions? Contact Us</a>
            </div>
        </section>

        <script>
            async function loadProjects() {
                try {
                    const response = await fetch('admin/api/api.php?action=get_projects&limit=50&offset=0');
                    if (!response.ok) return;
                    const projects = await response.json();
                    if (!projects || projects.length === 0) {
                        document.getElementById('projects-grid').innerHTML = '<p class="col-span-2 text-center text-gray-500">No projects found.</p>';
                        return;
                    }

                    const fixP = (p) => p && !p.startsWith('http') && !p.startsWith('admin/') && !p.startsWith('naroda_group_assets/') ? 'admin/' + p : p;

                    const grid = document.getElementById('projects-grid');
                    grid.innerHTML = projects.map(p => {
                        const imgSrc = p.image ? fixP(p.image) : 'naroda_group_assets/1 (26).jpeg';
                        const detailUrl = p.detail_url ? p.detail_url : `project-details.html?id=${p.id}`;

                        return `
                        <div class="bg-white rounded-xl shadow-lg overflow-hidden group feature-card"
                            style="transition: transform 0.3s ease, box-shadow 0.3s ease;"
                            onmouseover="this.style.transform='translateY(-8px)';this.style.boxShadow='0 25px 40px -10px rgba(0,0,0,0.2)'"
                            onmouseout="this.style.transform='';this.style.boxShadow=''">
                            <div class="relative h-96 bg-gray-200 overflow-hidden">
                                <img src="${imgSrc}" alt="${p.name}"
                                    class="w-full h-full object-cover" style="transition: transform 0.7s ease;"
                                    onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform=''"
                                    onerror="this.src='https://placehold.co/1200x800/c5a47e/fff?text=${encodeURIComponent(p.name)}'">
                                <div
                                    class="absolute top-6 left-6 bg-black text-white px-4 py-2 text-sm uppercase rounded-full font-semibold tracking-wide">
                                    ${p.type || 'Residential'}</div>
                                <div class="absolute inset-x-0 bottom-0 h-24"
                                    style="background:linear-gradient(to top,rgba(0,0,0,0.4),transparent);"></div>
                            </div>
                            <div class="p-8">
                                <h3 class="text-2xl font-bold mb-2">${p.name}</h3>
                                <p class="text-gray-600 text-base mb-3" style="display:flex;align-items:center;gap:4px;">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg>
                                    ${p.location || 'Ahmedabad, Gujarat'}
                                </p>
                                <p class="text-gray-600 mb-6">${p.description || 'Premium residential project by Naroda Group.'}</p>
                                <div class="flex justify-between items-center border-t pt-6">
                                    <a href="${detailUrl}" class="text-base font-semibold hover:underline"
                                        style="display:flex;align-items:center;gap:4px;">
                                        View Details
                                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M9 5l7 7-7 7" />
                                        </svg>
                                    </a>
                                    <span class="text-sm text-gray-500 font-medium bg-gray-100 px-3 py-1 rounded-full">&#8377;
                                        ${p.price || 'Enquire'}</span>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                } catch (e) {
                    console.error('Error loading projects:', e);
                }
            }
            document.addEventListener('DOMContentLoaded', loadProjects);
        </script>
    </main>

    <!-- footer container (original) -->
    <div id="footer-container"></div>

    <!-- main js (original) -->
    <script src="js/main.js?v=2026_v4"></script>
</body>

</html>
