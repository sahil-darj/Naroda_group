<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team | Naroda Group</title>
    <link rel="icon" type="image/jpeg" href="naroda_group_assets/naroda copy.jpeg">

    <!-- Vendor CSS -->
    <link rel="stylesheet" href="assets/vendor-Cs8yHCv6.css">
    <link rel="stylesheet" href="assets/index-BHu5_JeH.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            color: #111;
        }

        .career-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .career-label::before,
        .career-label::after {
            content: "";
            height: 1px;
            width: 100px;
            background: #eee;
        }

        .container-base {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .header-spacer {
            height: 75px;
            background: #000;
        }

        .team-hero {
            padding: 80px 0;
            text-align: center;
            background: #fdfdfd;
        }

        .team-hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            padding: 80px 0;
        }

        .team-card {
            text-align: center;
            transition: transform 0.3s ease;
        }

        .team-image-wrap {
            width: 100%;
            aspect-ratio: 1/1.2;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 25px;
            background: #f5f5f5;
        }

        .team-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .team-card:hover img {
            transform: scale(1.05);
        }

        .team-info h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .team-info p {
            color: #888;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Shimmer Effect */
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }
    </style>
</head>

<body>
    <div id="header-container"></div>
    <div class="header-spacer"></div>

    <main>
        <section class="team-hero">
            <div class="container-base">
                <div class="career-label">Team</div>
                <p style="max-width: 600px; margin: 0 auto; color: #666; line-height: 1.8;">Meet the exceptional minds
                    behind Naroda Group's success. A collective of experts dedicated to redefining architectural
                    brilliance and lifestyle standards.</p>
            </div>
        </section>

        <section class="container-base">
            <div id="team-container" class="team-grid">
                <!-- Loaded via JS -->
                <div class="team-card">
                    <div class="team-image-wrap shimmer"></div>
                    <div style="height: 20px; width: 60%; margin: 10px auto; background: #eee;"></div>
                    <div style="height: 15px; width: 40%; margin: 0 auto; background: #eee;"></div>
                </div>
                <div class="team-card">
                    <div class="team-image-wrap shimmer"></div>
                    <div style="height: 20px; width: 60%; margin: 10px auto; background: #eee;"></div>
                    <div style="height: 15px; width: 40%; margin: 0 auto; background: #eee;"></div>
                </div>
                <div class="team-card">
                    <div class="team-image-wrap shimmer"></div>
                    <div style="height: 20px; width: 60%; margin: 10px auto; background: #eee;"></div>
                    <div style="height: 15px; width: 40%; margin: 0 auto; background: #eee;"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="js/main.js"></script>
    <script>
        async function fetchTeam() {
            try {
                const response = await fetch('admin/api/api.php?action=get_team');
                const team = await response.json();

                const container = document.getElementById('team-container');

                if (team && team.length > 0) {
                    const formatImagePath = (path) => {
                        if (!path) return 'naroda_group_assets/team_placeholder.jpg';
                        if (path.startsWith('api/')) return 'admin/' + path;
                        return path;
                    };

                    container.innerHTML = team.map(member => `
                        <div class="team-card">
                            <div class="team-image-wrap">
                                <img src="${formatImagePath(member.image)}" alt="${member.name}">
                            </div>
                            <div class="team-info">
                                <h3>${member.name}</h3>
                                <p>${member.designation}</p>
                                <div class="team-social" style="margin-top: 15px; display: flex; gap: 12px; justify-content: center;">
                                    ${member.facebook ? `<a href="${member.facebook}" target="_blank" style="color: #666; font-size: 16px;"><i class="fab fa-facebook"></i></a>` : ''}
                                    ${member.instagram ? `<a href="${member.instagram}" target="_blank" style="color: #666; font-size: 16px;"><i class="fab fa-instagram"></i></a>` : ''}
                                    ${member.linkedin ? `<a href="${member.linkedin}" target="_blank" style="color: #666; font-size: 16px;"><i class="fab fa-linkedin"></i></a>` : ''}
                                    ${member.twitter ? `<a href="${member.twitter}" target="_blank" style="color: #666; font-size: 16px;"><i class="fab fa-twitter"></i></a>` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">Our team profiles are being updated. Check back soon.</p>';
                }
            } catch (error) {
                console.error('Error fetching team:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchTeam);
    </script>
</body>

</html>
